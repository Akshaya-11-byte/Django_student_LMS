{% extends "homepage.html" %}

{% block title %}
Student Details
{% endblock title %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center mb-4">Student Details</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Update Student
        </button>

        <a href="{% url 'homepage' %}" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

{% endblock content %}
